name: HACS Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  validate-hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  validate-hassfest:
    name: Hassfest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  validate-import:
    name: Import Test (Latest HA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Home Assistant and dependencies
        run: pip install homeassistant aiohttp

      - name: Test import of all integration modules
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}"
          DOMAIN="vivertine"
          COMPONENT_DIR="custom_components/${DOMAIN}"
          echo "Testing imports for ${DOMAIN}..."
          FAILED=0
          for pyfile in ${COMPONENT_DIR}/*.py; do
            module="custom_components.${DOMAIN}.$(basename ${pyfile} .py)"
            echo -n "  Importing ${module}... "
            if python -c "import ${module}" 2>&1; then
              echo "OK"
            else
              echo "FAILED"
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo "::error::One or more imports failed"
            exit 1
          fi
          echo "All imports successful"
